services:
  traefik:
    image: traefik:v3.6
    container_name: rydberg-traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.55
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=rydberg-net"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rydberg-net

networks:
  rydberg-net:
    external: true

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rydberg-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - rydberg-net

networks:
  rydberg-net:
    external: true

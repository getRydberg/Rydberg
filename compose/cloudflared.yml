services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rydberg-tunnel
    restart: unless-stopped
    profiles:
      - full
    # The token is read from your .env file.
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - rydberg-net

networks:
  rydberg-net:
    external: true